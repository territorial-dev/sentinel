name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sentinel
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @sentinel/shared build

      - name: Run database migrations
        working-directory: apps/api
        run: pnpm migrate:ci
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sentinel
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
          JWT_SECRET: test-secret

      - name: Run tests with coverage
        working-directory: apps/api
        run: pnpm test:coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sentinel
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
          JWT_SECRET: test-secret

      - name: Generate coverage badge
        uses: jaywcjlove/coverage-badges-action@main
        if: github.ref == 'refs/heads/main'
        with:
          source: apps/api/coverage/coverage-summary.json
          output: .badges/coverage.svg

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .badges/coverage.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push
