name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sentinel
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @sentinel/shared build

      - name: Run database migrations
        working-directory: apps/api
        run: pnpm migrate:ci
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sentinel
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
          JWT_SECRET: test-secret

      - name: Run tests with coverage
        working-directory: apps/api
        run: pnpm test:coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sentinel
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
          JWT_SECRET: test-secret

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          node - <<'EOF'
          const fs = require('fs')
          const summary = JSON.parse(fs.readFileSync('apps/api/coverage/coverage-summary.json', 'utf8'))
          const pct = Math.round(summary.total.lines.pct)
          const color = pct >= 80 ? '#4c1' : pct >= 60 ? '#dfb317' : '#e05d44'
          const label = 'coverage'
          const value = `${pct}%`
          const lw = 70, vw = 52, h = 20
          const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${lw+vw}" height="${h}">
            <linearGradient id="s" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>
            <rect rx="3" width="${lw+vw}" height="${h}" fill="#555"/>
            <rect rx="3" x="${lw}" width="${vw}" height="${h}" fill="${color}"/>
            <rect x="${lw}" width="4" height="${h}" fill="${color}"/>
            <rect rx="3" width="${lw+vw}" height="${h}" fill="url(#s)"/>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="${lw/2}" y="15" fill="#010101" fill-opacity=".3">${label}</text>
              <text x="${lw/2}" y="14">${label}</text>
              <text x="${lw+vw/2}" y="15" fill="#010101" fill-opacity=".3">${value}</text>
              <text x="${lw+vw/2}" y="14">${value}</text>
            </g>
          </svg>`
          fs.mkdirSync('.badges', { recursive: true })
          fs.writeFileSync('.badges/coverage.svg', svg)
          console.log(`Coverage badge: ${pct}%`)
          EOF

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .badges/coverage.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push
