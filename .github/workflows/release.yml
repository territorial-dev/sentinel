name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sentinel
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @sentinel/shared build

      - name: Run database migrations
        working-directory: apps/api
        run: pnpm migrate:ci
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sentinel
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
          JWT_SECRET: test-secret

      - name: Run tests
        working-directory: apps/api
        run: pnpm test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sentinel
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
          JWT_SECRET: test-secret

  release:
    name: Semantic Release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.check.outputs.published }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Capture version before release
        id: before
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Run semantic-release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect if a new release was published
        id: check
        run: |
          AFTER=$(node -p "require('./package.json').version")
          if [ "${{ steps.before.outputs.version }}" != "$AFTER" ]; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "tag=v$AFTER" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

  docker-full:
    name: Build sentinel (API + Web)
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            paschendale/sentinel:latest
            paschendale/sentinel:${{ needs.release.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-api:
    name: Build sentinel-api (API only)
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            paschendale/sentinel-api:latest
            paschendale/sentinel-api:${{ needs.release.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
